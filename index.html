<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .maintenance-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .icon {
            font-size: 80px;
            color: #667eea;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Countdown timer */
        .timer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .timer-item {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .timer-item span {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        .timer-item label {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Social links */
        .social-links {
            margin: 30px 0 20px;
        }

        .social-links a {
            color: #667eea;
            margin: 0 10px;
            font-size: 24px;
            transition: color 0.3s;
            display: inline-block;
        }

        .social-links a:hover {
            color: #764ba2;
            transform: translateY(-3px);
        }

        .footer {
            font-size: 0.9rem;
            color: #999;
            margin-top: 20px;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .maintenance-card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .timer {
                gap: 10px;
            }
            .timer-item {
                padding: 10px;
                min-width: 60px;
            }
            .timer-item span {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <!-- Icon (you can change it) -->
        <div class="icon"><i class="fas fa-tools"></i></div>
        
        <h1>Under Maintenance</h1>
        <p>We're currently performing scheduled maintenance. We'll be back online shortly. Thank you for your patience!</p>
        
        <!-- Countdown timer (set to 2 hours from now) -->
        <div class="timer">
            <div class="timer-item"><span id="hours">02</span><label>Hours</label></div>
            <div class="timer-item"><span id="minutes">00</span><label>Minutes</label></div>
            <div class="timer-item"><span id="seconds">00</span><label>Seconds</label></div>
        </div>

        <!-- Social media links (replace # with your URLs) -->
        <div class="social-links">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>

        <div class="footer">
            &copy; 2025 Your Company. All rights reserved.
        </div>
    </div>

    <!-- Countdown timer script -->
    <script>
        // Set the countdown to 2 hours from page load
        const targetTime = new Date().getTime() + 2 * 60 * 60 * 1000; // 2 hours in milliseconds

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetTime - now;

            // If countdown is finished, show 00:00:00
            if (distance < 0) {
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                return;
            }

            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }

        // Update timer every second
        setInterval(updateTimer, 1000);
        updateTimer(); // initial call
    </script>
</body>
</html>
